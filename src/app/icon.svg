<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Círculo ámbar (fondo del logo) -->
  <circle cx="50" cy="50" r="48" fill="#D97706"/>
  
  <!-- Espiga de trigo (espelta) - dorada -->
  <g fill="#FCD34D" stroke="#92400E" stroke-width="0.8">
    <!-- Tallo -->
    <path d="M 50 78 L 50 35" stroke="#92400E" stroke-width="1.5" fill="none"/>
    
    <!-- Granos de la espiga -->
    <ellipse cx="50" cy="38" rx="3.5" ry="6"/>
    <ellipse cx="46" cy="43" rx="3.5" ry="5.5" transform="rotate(-25 46 43)"/>
    <ellipse cx="54" cy="43" rx="3.5" ry="5.5" transform="rotate(25 54 43)"/>
    <ellipse cx="44" cy="50" rx="3.5" ry="5.5" transform="rotate(-35 44 50)"/>
    <ellipse cx="56" cy="50" rx="3.5" ry="5.5" transform="rotate(35 56 50)"/>
    <ellipse cx="46" cy="57" rx="3.5" ry="5" transform="rotate(-25 46 57)"/>
    <ellipse cx="54" cy="57" rx="3.5" ry="5" transform="rotate(25 54 57)"/>
    
    <!-- Aristas (pelos de la espiga) -->
    <line x1="50" y1="32" x2="50" y2="28" stroke="#FCD34D" stroke-width="0.8"/>
    <line x1="44" y1="39" x2="40" y2="35" stroke="#FCD34D" stroke-width="0.8"/>
    <line x1="56" y1="39" x2="60" y2="35" stroke="#FCD34D" stroke-width="0.8"/>
    <line x1="41" y1="46" x2="36" y2="42" stroke="#FCD34D" stroke-width="0.8"/>
    <line x1="59" y1="46" x2="64" y2="42" stroke="#FCD34D" stroke-width="0.8"/>
  </g>
  
  <!-- Hoja verde (galanga/hinojo) -->
  <path d="M 58 62 Q 70 55 75 62 Q 70 72 58 68 Z" fill="#059669" stroke="#065F46" stroke-width="0.5"/>
  <path d="M 58 65 L 72 63" stroke="#065F46" stroke-width="0.5" fill="none"/>
</svg>
